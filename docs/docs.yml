info:
    title: Airbean API
    description: API Documentation for Airbean API
    version: 1.0.0
openapi: 3.0.1
components:
    schemas:
        Key:
            description: API Key
            type: string
            example: xxxxx
        Cart:
            description: Cart for storing orders
            type: object
            properties:
                cartId:
                    type: string
                    example: xxxxxxxxxxxxxxxxxxxxx
                items:
                    type: array
                    items:
                        type: object
                        properties:
                            prodId:
                                type: string
                                example: xxxx-xxxxx
                            title:
                                type: string
                                example: Caffè Doppio
                            price:
                                type: number
                                example: 49
                            qty:
                                type: number
                                example: 1
        User:
            description: Authenticated user
            type: object
            properties:
                userId:
                    type: string
                    example: xxxxx
                username:
                    type: string
                    example: kaffeälskarn
                role:
                    type: string
                    example: user
        UserBody:
            description: Register or login body
            type: object
            properties:
                username:
                    type: string
                    example: kaffeälskarn
                password:
                    type: string
                    example: hemligtkodord
                role:
                    type: string
                    example: user
        Product:
            description: The menu with products
            type: object
            properties:
                prodId:
                    type: string
                    example: xxxx-xxxxx
                title:
                    type: string
                    example: Caffè Doppio
                desc:
                    type: string
                    example: Bryggd på månadens bönor
                price:
                    type: number
                    example: 49
        Order:
            description: The users order
            type: object
            properties:
                orderId:
                    type: string
                    example: xxxxx
                userId:
                    type: string
                    example: xxxxx
                items:
                    type: array
                    items:
                        type: object
                        properties:
                            prodId:
                                type: string
                                example: xxxx-xxxxx
                            title:
                                type: string
                                example: Caffè Doppio
                            price:
                                type: number
                                example: 49
                            qty:
                                type: number
                                example: 1
                sum:
                    type: number
                    example: 49
    responses:
        BadRequestResponse:
            description: Bad request from client
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            success:
                                type: boolean
                                example: false
                            message:
                                type: string
                                example: Username and password are required
        UnauthorizedResponse:
            description: Unauthorized - Not logged in or missing/invalid API key
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            success:
                                type: boolean
                                example: false
                            message:
                                type: string
                                example: No API key provided
        ForbiddenResponse:
            description: Forbidden - admin access required
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            success:
                                type: boolean
                                example: false
                            message:
                                type: string
                                example: Admin access required
        NotFoundResponse:
            description: Resource not found
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            success:
                                type: boolean
                                example: false
                            message:
                                type: string
                                example: The requested resource/s was not found

paths:
    /api/keys:
        get:
            tags:
                - API Key
            description: Returns a random API key
            responses:
                "200":
                    description: Returns a random API key
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                        example: true
                                    key:
                                        type: string
                                        example: xxxxx
                "404":
                    $ref: "#/components/responses/NotFoundResponse"
    /api/menu:
        get:
            tags:
                - Menu
            description: Returns all menu items
            parameters:
                - in: header
                  name: x-api-key
                  required: true
                  schema:
                      $ref: "#/components/schemas/Key"
            responses:
                "200":
                    description: Returns all menu items
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                        example: true
                                    menu:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/Product"
                "401":
                    $ref: "#/components/responses/UnauthorizedResponse"
                "404":
                    $ref: "#/components/responses/NotFoundResponse"
    /api/auth/register:
        post:
            tags:
                - Auth
            description: Register new user
            parameters:
                - in: header
                  name: x-api-key
                  required: true
                  schema:
                      $ref: "#/components/schemas/Key"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/UserBody"
            responses:
                "201":
                    description: Response for successful registration
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                        example: true
                                    message:
                                        type: string
                                        example: User registered successfully
                                    user:
                                        type: object
                                        properties:
                                            userId:
                                                type: string
                                                example: xxxxx
                                            username:
                                                type: string
                                                example: grodanboll
                                            role:
                                                type: string
                                                example: user
                "400":
                    $ref: "#/components/responses/BadRequestResponse"
                "401":
                    $ref: "#/components/responses/UnauthorizedResponse"
    /api/auth/login:
        post:
            tags:
                - Auth
            description: Login user
            parameters:
                - in: header
                  name: x-api-key
                  required: true
                  schema:
                      $ref: "#/components/schemas/Key"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/UserBody"
            responses:
                "200":
                    description: Response for successful login
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                        example: true
                                    message:
                                        type: string
                                        example: User logged in successfully
                                    user:
                                        $ref: "#/components/schemas/User"
                "400":
                    $ref: "#/components/responses/BadRequestResponse"
                "401":
                    $ref: "#/components/responses/UnauthorizedResponse"
                "404":
                    $ref: "#/components/responses/NotFoundResponse"
    /api/auth/logout:
        post:
            tags:
                - Auth
            description: Logout user
            parameters:
                - in: header
                  name: x-api-key
                  required: true
                  schema:
                      $ref: "#/components/schemas/Key"
            responses:
                "200":
                    description: Response for successful logout
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                        example: true
                                    message:
                                        type: string
                                        example: User logged out succesfully
                "401":
                    $ref: "#/components/responses/UnauthorizedResponse"
    /api/carts:
        get:
            tags:
                - Carts
            description: Returns all carts
            parameters:
                - in: header
                  name: x-api-key
                  required: true
                  schema:
                      $ref: "#/components/schemas/Key"
            responses:
                "200":
                    description: Returns all carts
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                        example: true
                                    carts:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/Cart"
                "401":
                    $ref: "#/components/responses/UnauthorizedResponse"
                "404":
                    $ref: "#/components/responses/NotFoundResponse"
        patch:
            tags:
                - Carts
            description: Add, remove or update quantity of an item in the cart. Creates a new cart if none exists.
            parameters:
                - in: header
                  name: x-api-key
                  required: true
                  schema:
                      $ref: "#/components/schemas/Key"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - prodId
                                - qty
                            properties:
                                prodId:
                                    type: string
                                    example: xxxx-xxxxx
                                qty:
                                    type: number
                                    description: Positive to add, negative to remove. Item is deleted if qty reaches 0.
                                    example: 1
                                cartId:
                                    type: string
                                    description: Only required for guests with an existing cart
                                    example: xxxxxxxxxxxxxxxxxxxxx
            responses:
                "200":
                    description: Cart updated successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                        example: true
                                    cartId:
                                        type: string
                                        example: xxxxxxxxxxxxxxxxxxxxx
                                    cart:
                                        $ref: "#/components/schemas/Cart"
                "400":
                    $ref: "#/components/responses/BadRequestResponse"
                "401":
                    $ref: "#/components/responses/UnauthorizedResponse"
    /api/carts/{cartId}:
        get:
            tags:
                - Carts
            description: Returns a specific cart by cartId
            parameters:
                - in: header
                  name: x-api-key
                  required: true
                  schema:
                      $ref: "#/components/schemas/Key"
                - in: path
                  name: cartId
                  required: true
                  schema:
                      type: string
                      example: xxxxxxxxxxxxxxxxxxxxx
            responses:
                "200":
                    description: Returns the cart with the given cartId
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                        example: true
                                    cart:
                                        $ref: "#/components/schemas/Cart"
                "401":
                    $ref: "#/components/responses/UnauthorizedResponse"
                "404":
                    $ref: "#/components/responses/NotFoundResponse"

    /api/orders:
        get:
            tags:
                - Orders
            description: Returns all orders
            parameters:
                - in: header
                  name: x-api-key
                  required: true
                  schema:
                      $ref: "#/components/schemas/Key"
            responses:
                "200":
                    description: Returns all orders
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                        example: true
                                    orders:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/Order"
                "401":
                    $ref: "#/components/responses/UnauthorizedResponse"
                "404":
                    $ref: "#/components/responses/NotFoundResponse"
    /api/orders:
        post:
            tags:
                - Orders
            description: Creates a new order from the cart with the given cartId. The cart is deleted after the order is created.
            parameters:
                - in: header
                  name: x-api-key
                  required: true
                  schema:
                      $ref: "#/components/schemas/Key"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - cartId
                            properties:
                                cartId:
                                    type: string
                                    example: xxxxxxxxxxxxxxxxxxxxx
            responses:
                "201":
                    description: Order created successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                        example: true
                                    order:
                                        $ref: "#/components/schemas/Order"
                "400":
                    $ref: "#/components/responses/BadRequestResponse"
                "401":
                    $ref: "#/components/responses/UnauthorizedResponse"
    /api/orders/{userId}:
        get:
            tags:
                - Orders
            description: Returns all orders for a specific user
            parameters:
                - in: header
                  name: x-api-key
                  required: true
                  schema:
                      $ref: "#/components/schemas/Key"
                - in: path
                  name: userId
                  required: true
                  schema:
                      type: string
                      example: xxxxx
            responses:
                "200":
                    description: Returns orders for the given userId
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                        example: true
                                    orders:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/Order"
                "401":
                    $ref: "#/components/responses/UnauthorizedResponse"
                "404":
                    $ref: "#/components/responses/NotFoundResponse"
